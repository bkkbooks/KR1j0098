body:
  text: 埤蒼祕宓廣韻入聲五質祕字注禨妖祥也史記五宗世家司馬貞索隱璟玉光彩廣韻上聲二十八梗璟字注琗同瑟顧野王玉篇玉部瓔珢石似玉也同上垂㻷地名出美玉玉篇玉部廣韻入聲二十四職㻷字注瑰瑋珍琦也文選班孟堅西都賦李善注又王仲宣登樓賦注玉篇玉部引上四字又引云琦瑋也瑰于鬼反釋元應佛本行集經音義瑋于鬼反法炬陀羅尼經音義玲瓏玉聲玲力經切瓏力東切文選班孟堅東都賦注丁度集韻上平聲一東瓏字注引上句黃公紹古今韻會平聲上引云玉聲玲瓏也珠百枚曰琲廣韻去聲十八隊琲字注璘㻞文采貌集韻上平聲十七真㻞字注穿耳施珠曰璫充耳也見實三昧經音義璘斑文貌文選何平叔景福殿賦注艽遠荒又音求廣韻上平聲六脂艽字注𦸚茵水草廣韻入聲二十六緝𦸚字注蒩蕺也側及反文選左太沖蜀都賦注茸竹頭有文也文選張平子南都賦注𦾶麥芒也慈斂切文選枚叔七發注廣韻上聲五十琰𦾶字注引云麥秀貌齊茝一名囂史記司馬相如傳索隱蔄姓也集韻去聲五十候蔄字注𧂐積也大般涅槃經音義苾水香也苾苾然濕室洗浴衆僧經音義纓絡經音義引作苾水香也䕞𦿆毒草也入楞伽經音義荿竹抒也十二門論音義𠰉喉鳴玉篇口部囁嚅多言也同上嘺不知是誰也同上集韻下平聲四宵嘺字注引無是字嚊𠺒息聲也文選揚子雲羽獵賦注嘈嘈聲衆也文選王文考魯靈光殿賦注嘈啈聲貌啈與囋及囐同才曷切文選陸士衡文賦注𠹊𡂕寂靜也𠹊𡂕與愺恅音義同愺粗老切恅閶草切文選王子淵洞簫賦注哮赫大怒也呼交切同上大般涅槃經音義引上句作大怒聲也嗃大呼也呼交切文選馬季長長笛賦注呤呤語也廣韻下平聲十五青呤字注集韻同唪口高貌也廣韻上聲二腫唪字注㗢大歌聲廣韻去聲一送㗢字注嘶聲散也亦悲聲也法炬陀羅尼經音義勝天王般若經音義十地論音義噢咿內悲也亦痛念之聲也四童子經音義大智度論有義六度集音義太子墓魄經音義正法念經音義陀羅尼雜集經音義並引作內志也大方便報恩經音義引作謂痛悲之聲也諫王經音義亦引作痛悲太子本起瑞應經音義引上句噎塞也大方便報恩經音義嘊喍犬相啀拒也妙法蓮華經音義唼鴨食也大莊嚴法門經音義喃語聲也大智度論音義呿張口也同上唵哈也謂掌進食也正法念經音義嚃啜也五分律音義叨食也解脫道論音義哹吹食聲也陀羅尼雜集經音義噆嚙脣也治禪病祕要經音義逢鼓聲也亦作韸毛詩釋文𨔥至也廣韻下平聲一先𨔥字注遑役也梵志阿跋經音義倣徨猶倣佛也文選洞簫賦注傍徨仿佯也梵志阿跋經音義齸鹿粻又音翳爾雅釋文齛羊粻也同上齴音眼文選張平子西京賦注䠫醉倒貌廣韻去聲五十候䠫字注䟸蹶跳也求悲切文選郭景純江賦注踃跳也先聊切文選傅武仲無賦注蹶起也史記陸賈傳索隱維摩詰經音義踡局不伸也瑜伽師地論音義顯揚聖教論音義躘踵行不進貌一曰小貌集韻上平聲三鍾躘字注躟疾行貌文選傅武仲舞賦注注射廣韻去聲十遇注字注諄告曉之熟毛詩釋文譫多言也起世經音義詁誽言不正集韻上平聲十三佳誽字注䛠譳不能言也集韻去聲五十候䛠字注靮音的馬韁鞚也徐堅初學記卷二十二太平御覽卷三百二十八鞚馬勒文選鮑明遠擬古詩注太平御覽卷三百五十八𩋠䩭勒靻也𩋠音面䩭音羈靻音折柔皮也太平御覽卷三百五十八鞴靫箭室也集韻上平聲十三佳靫子注䩐急縶縛也集韻入聲十一沒䩐字注皴皮皴皵也樹皮甲錯粗厚亦曰皴無明羅剎經音義皵音土約皮同上𥀃石蜜膜也集韻去聲五十候𥀃字注䀨怒視貌廣韻入聲十四點集韻入聲十五舝並䀨字注䀴視貌五夾切廣韻入聲三十一洽䀴字注睳瘠人視貌集韻上平聲十二齊睳字注鱗眴無涯也眴音旬文選西京賦注瞪直視也直耕切文選洞簫賦注又魯靈光殿賦注引云瞪直證切又陸士衡豪士賦序注央掘魔經音義並引首也瞢視不審諦也共耕切文選洞簫賦注瞟明察也鞞婆阿毗曇論音義又一目病廣韻上聲三十小瞟字注瞳目珠子也佛本行集經音義瞡眇視貌集韻去聲五置瞡字注睥睨邪視也史記信陵君傳索隱又魏其侯傳索隱䁫地名一曰耳黧集韻入聲十一沒䁫字注𥉁目驚𥉁𥉁然廣韻去聲十遇𥉁字注皭白色也在爵切廣韻入聲十八藥皭字注皎明也淨也大方便報恩經音義中阿含經音義齆鼻病也集韻去聲一送齆字注七佛神呪經音義引作齆鼻疾也羺胡羊也四分律音義瑜伽師地論音義鳲鳩鴶鵴詩召南鵲巢孔頴達正義方言云戴勝爾雅釋鳥邢昺疏鶆鳩鷹廣韻上平聲十六咍鶆字注鴘鷹鷂二年色又人姓廣韻上聲二十八獮鴘字注披免切陸佃埤雅釋鳥𪁪鴟也怪鳥也輪轉五道罪福報應經音義鷓鴶似服鳥而大善見律音義殕腐也同上骲骨鏃也爾雅釋文髂腰骨也口亞切文選揚子雲解嘲注髎尻骨謂八髎一曰夜蹄史記貨殖傳索隱髂腰骨也中阿含經音義佛本行集經音義髖尻也髀上也大般涅槃經音義四分律音義阿毗曇毗婆沙論音義雜阿毗曇心論音義瑜伽師地論音義俱舍論音義髁尻骨也四分比邱戒本音義䐜引起也玉篇肉部篇海肉部膉豕伏槽同上𦢑同𦟠唧嘁玉篇肉部腠膚理也爾雅釋文䐿鳥胃也廣韻去聲三十七號䐿字注肨脹腹滿也脹豬亮反摩訶般若波羅蜜經音義胮肛腹脹也集韻上平聲四江胮字注韻會引作胮肛腸脹䐻膊大脯也集韻上平聲十一模䐻字注腣胿腹胅也集韻上平聲十二齊腣字注䑎𦞦也集韻下平聲二十四鹽䑎字注腲腇肥貌腲一罪切腇乃罪切文選洞簫賦注腋在肘後文選盧子諒答魏子悌詩注胳肘後也文殊師利間菩薩四者經音義後出阿彌陀偈音義引云肘後曰胳𠞩割也斷也廣韻入聲五質𠞩字注剜削也月燈三昧經音義劈剖也佛本行集經音義䎧䥯器廣韻上聲三講䎧字注簪速也周易釋文簪引鄭云速也埤蒼同箱序也後漢書虞詡傳章懷太子注篾析竹膚也般若燈論音義阿毗曇毗婆沙論音義引咅云析皮也䭔膏䭔也太平御覽卷八百五十一餼饋也五百弟子自說本起經音義䅘牟䅘牟之麥一麥二稃周受此瑞麥廣韻上平聲十六咍䅘字注𩏄皮拜反所以冶家用炊火之熾者也大威德陀羅尼經音義順正理論音義正法念經音義引作韌瑜伽師地論音義作蒲戒反無所以二字冶作鍛𩏄又作裶同蒲戒反舍利弗阿毗曇論音義植戶持鎖植也爾雅釋宮郭璞注𣔻戶持鎖植也集韻入聲十一沒𣔻字注枃子吝切凡織先經以枃梳絲使不亂玉篇木部廣韻去聲二十一震集韻去聲二十三稕並枃字注櫞果名似橘玉篇木部廣韻下平聲二仙櫞字注㯸盂也即忍切廣韻上聲十六軫㯸字注柧藤屬蜀人以織布廣韻去聲十五卦柧字注榙𣝋果名似李廣韻入聲二十七合榙字注𣚀欈木名實可食集韻上平聲四支欈字注石榴奈屬也初學記卷二十八楣梁也爾雅釋文棶椋也同上𣘻案今人以作飲音真加反茗之類同上檽音乃巨反後漢書王符傳注格木長貌也文選司馬長卿上林賦注檣帆柱也才羊切文選江賦注又王仲宣從軍詩注引云帆柱曰檣櫍椹也訶色欲經音義枰榻也大智度論音義大方便報恩經音義椸式支反竿謂之椸用以架衣也太子本起瑞應經音義桊牛拘別譯阿含經音義狗榾木名也僧祗津音義囊橐有底曰囊無底曰橐史記陸賈傳索隱賭䞈也賭丁古切文選韋宏嗣博奕論注䞈記被切同上昈赤文也音戶文選西京賦注皓白也文選向子期懷舊賦注旇旌旗又衣服貌廣韻去聲五置旇字注旓旌旗斿也旓所交切文選揚子雲甘泉賦注朣朧欲明也朣徒東切朧力東切文選潘安仁秋興賦注又文賦注又潘安仁悼亡詩注𤖴恥格反俱舍論音義穭自生也後漢書獻帝紀注黣謂禾傷雨而生黑斑也列子黃帝篇殷敬順釋文昁𤾉米也五分律音義寂寥無人也法炬陀羅尼經音義㾽病也玉篇疒部㾔晉大夫冀叔㾔也同上瘭音必燒反後漢書鮮卑傳注瘭疽也立世阿毗曇心論音義啞亦瘖也妙法蓮華經音義長阿含經音義癡騃也音見律音義𢅰㡗赤𥿄也廣韻上平聲十二齊㡗字注帢帽也廣韻入聲三十一洽帢字注㠿布名集韻上平聲五支㠿字注俑木人送葬設關而能踊跳故名之曰俑孫奭孟子音義卷上廣韻上聲二腫俑字注餘腫切或謂偶文選謝惠連祭古冢文注偶刻木以像人形五苟切文選祭古冢文注佊邪也廣韻上聲四𥿄佊字注𠏤載器也廣韻上聲三十六養𠏤字注俌輔也廣韻去聲十遇俌字注傱走貌先鞏切文選左太沖吳都賦注又羽獵賦注傞𢶷也文選長笛賦注佛鬱不安貌文選潘安仁笙賦注俾倪城上小垣也大般涅槃經音義阿毗曇毗婆沙論音義伶俜猶聯翩也妙法蓮華經音義倥偬窮困也後漢書張衡傳注褑佩絞也爾雅釋文褶絭衣也今言褶疊是也四分律音義䙘鮮也一曰美好貌廣韻上聲八語䙘字注衴被緣也廣韻上聲四十八咸衴字注䙎衣袖也集韻上平聲十二佳䙎字注袘衣長貌也史記司馬相如傳索隱毾㲪毾音宅闔反㲪音登毛席也後漢書西域傳注艆䑼海中船曰艆䑼郎鄒二音初學記卷二十五𦩍吳船也音雕同上船舷也亦名𦨲優婆塞五戒相經音義艗五歷反佛本行集經音義缺㰦張口頻伸也見實三昧經音義㱇恐懼也七佛神呪經音義賢愚經音義佛本行集經音義大智度論音義髏頭骨也大集曰藏分經音義𨠚同靦玉篇面部斒斕文貌也觀世音菩薩受記經音義賢愚經音義髦髮也髫與齠古字通也大聊切文選張景陽七命注又潘安仁籍田賦注引云髫髦也大聊切又潘安仁楊仲武誄注後漢書伏湛傳注並引髫髦也句鬞鬞鬞髮亂或從毛集韻上平聲四江鬞𣰊字注镽細毛也集韻下平聲三蕭镽字注覗候也察也滑慈滑吏二反玉篇見部妙法蓮華經音義引有伺猶察也句峘大山又音恆爾雅釋文巒山小而鋭同上崴㠢不平也又重纍貌崴烏乘切㠢故乘切文選左太沖吳都賦注㟎山長貌文選揚子雲甘泉賦注嵢巆嶙峋萬山無崖之貌㟏音零巆音營嶙音鄰峋音旬同上又左太沖魏都賦注引嶙峋山崖之貌也崛特起也魚勿切文選西京賦注大智度論音義引云崫特立也崛與倔同文選班叔皮王命論注引崛特起也及此句巉嶮皆高峻貌巉助奄切嶮魚檢切文選西京賦注崔崒崔徂回切崒情律切同上岝㟯山不齊也文選南都賦注岪鬱山貌扶勿切文選吳都賦注崎嶇不平也崎夫奇切嶇音區文選禰正平鸚鵡賦注密迹金剛力士經音義不安也文選朱玉高唐賦注又陶淵明歸去來辭注嵐山風也嵐緑含切文選謝靈運晚出西射堂詩注嶁山巔也集韻上平聲十虞嶁字注庵㢀也樹提伽經音義僧祗律音義𥐙大石也文選南都賦注磼礏高貌也磼音土劫反礏音土楫反史記司馬相如傳索隱菩薩睒子經音義引云磼音才合反崎曲岸頭也文選謝靈運富春渚詩注崎與圻同文選飽明遠苦熱行注引崎曲岸云云礧碨礧也礧力罪切碨於賄切文選魯靈光殿賦注礧推石自高而下也集韻去聲十八隊礧壘礌雷檑字注塢小障也廣韻上聲十姥塢字注磁石也謂召鐵也大般涅槃經音義瑜伽師地論音義俱舍論音義並引作磁廣百論音義引云謂吸鐵者也砏磤大聲也大方等大雲請雨經音義磯水中磧石也僧祗律音義𧲂獸名似豕黃身曰首廣韻上平聲十七真𧲂字注獝狂無頭鬼後漢書禮儀志劉昭注㺦猭逃也㺦丑珍切猭恥傳切文選吳都賦注㺗犬噬也立世阿毗曇心論音義𡲗短尾犬也集韻入聲九迄𡲗字注𪖎鼠貌廣韻下平聲二十六咸𪖎字注熇熱貌許妖切文選魏都賦注六度集音義引上句炫光貌文選司馬長卿長門賦注煜光耀熾盛貌也光讚般若經音義菩薩本行經音義大智度論音義僧祗律音義並引云煜盛貌也烔烔烔然熱也大灌虞經音義㷿味辛也正法華經音義㚛肥大也玉篇大部𡕏鼓𣐎也俱舍論音義㥄栗也爾雅釋文爾雅釋言正義懰宿留也文選長笛賦注忶心悶也廣韻上平聲二十三魂忶字注㤝心動也集韻上平聲一東㤝字注欣察也明度無極經音義懍悷悲吟貌也又懍者顏色懼貌也大莊嚴經音義懱拭滅也力土移山經音義𠗺冰室也集韻上平聲五支𠗺𠗺字注廣韻作誃篇海水部𠗺云冰室門名言部誃同引洺南易水本名漳水此句據風土記補洺水之目不知誰改俗謂山之下地名洺水因經之故曰洺水太平御覽卷六十四風土記引埤蒼及水經濈水行出也文選南都賦注浹泄水滂溏也文選江賦注沸渭不安貌文選洞簫賦注澖漫分散也𣶏裁有水也所獵切並同上渟水止也文選長笛賦注大方廣佛華嚴經音義念佛三味經音義長阿含經音義佛本行讚經音義並引云水止曰渟瀺灂水流聲文選高唐賦注滑美貌也文選謝靈運石門新管所往四面高山回溪石瀨修竹茂林詩注沓釜沸出也文選七發注淰水無波也鼻奈耶律音義潠噴也音巽後漢書方術傳注佛所行讚音義引云噴也渧漉也廣韻去聲十二霽渧字注灕水滲入地也遼釋行均龍龕手鑑卷二靆音代妙法蓮華經音義鯆䱐䱡魚也一名江豚多膏少肉晉書夏統傳何超音義鯬鯠魾也爾雅釋文鰞鰂魚腹中有骨出南郡背有一骨闊二寸許有鬐甚長口中有墨瞋則潠人出曜論音義闃靜也文選魯靈光殿賦注又潘安仁懷舊賦注又任彥升上蕭太傅固辭奪情啓注又謝希逸宋孝武宣貴妃誄注引云靖也間雅也文選舞賦注闙苦禮反雜寶藏經音義與啓亦同廣韻上聲十一薺闙字注𦕒小耳垂玉篇耳部𦗳耳中聲也𦗣春秋地也䏆耳鳴也恧慚也𦕑告也𦗖耳鳴也聑耳垂並同上聱不聽也魚幽切文選吳都賦注玉篇耳部聱牙為其不相聽也篇海目部䏃法意聽也玉篇耳部廣韻下平聲一先䏃字注篇海耳部耽耽耽風聲文選宋玉風賦注耵聹耳上垢也大智度論音義思惟略要經音義捆𠊷也從才從木者誤也孟子音義卷上攖梏也孟子音義卷下挒搩也廣韻入聲十七薛挒字注抶笞擊也文選羽獵賦注攫地爪持也文選潘安仁射雉賦注掩覆也文選潘安仁懷舊賦注攘疾行貌文選舞賦注掐爪也文選長笛賦注大比邱威儀音義引云抓也揭立舉也巨列切文選賈誼過秦論注揀擇也不必定入印經音義擒捉也今皆作擒也增一阿含經音義僧祗律音義挑取也增一阿含經音義𢴲圍係也𨙻先比邱經音義五百弟子自說本起經音義㩫椹也泥犁經音義摸𢱢捫搎也大愛道比邱尼經音義捏捺搦治也解脫戒本音義拋擊也六度集音義攪苦學反俱舍論音義拱大弋也太平御覽卷三百三十七嬼妖也毛詩釋文集韻去聲四十九宥嬼字注娏女神名玉篇女部集韻上平聲四江娏字注娽顓頊妻名廣韻入聲一屋娽字注娪美女也集韻上平聲十一模娪字注嫋嫋嫋美也奴鳥切文選吳都賦注嫵媚悅也文選上林賦注戟盾也太平御覽卷三百五十六𤮊音康爾雅釋文甔大罌也字或從儋音丁甘反後漢書顯宗紀注㽄聲散也大般涅槃經音義佛入涅槃金剛力土哀戀經音義無明羅剎經音義㽃瓳大磚也佛滅度後金棺送葬經音義彆弓末反戾也毛詩釋文弤舜弓名廣韻上聲十一薺弤字注縻散也周易釋文緷大朿也爾雅釋文繲浣衣廣韻去聲十五卦繲字注練擇也與揀同義文選謝希逸月賦注又七發注引上句𧓴蠶二眠廣韻下平聲十四清𧓴字注䬐風遲也音隈文選江賦注坻坎也玉篇土部埫塎不安也同上坅坎也坑也同上儀禮釋文集韻上聲四十七寢坅字注引上句𡎻門聚在雎陽集韻上平聲二十八山𡎻字注坎亦坑也勝天王般若經音義場鼠垤也中阿含經音義墆長沙謂隄為墆遺教經音義塘長沙謂隄為塘俱舍論音義塙苦樂反燈指因緑經音義𤱨㽤韭畦也集韻上平聲三鍾𤱨𤲻字注𤳉耕麥地玉篇田部赤黃色廣韻下平聲二十四鹽字注劤多力也玉篇力部䯇䯇䯇力作也日藏分經音義勱強也勉也勤也無量清淨平等覺經音義鐎溫器有柄斗似銚無緣音譙史記李將軍傳索隱鋋小矛鐵矜史記胸奴傳索隱鎢䥈小釜也太平御覽卷七百五十七鐝磨鐝也大智度論音義鐴土犂具也毗尼母律音義鉎鏉也謂鐵衣也大比邱威儀音義鐇鏟也後漢書杜篤傳注立世阿毗曇論音義無也字鍝鋸也後漢書杜篤傳注䥯器廣韻上平聲五支䥯字注䥩懸物鉤廣韻上平聲入微䥩字注𨬖小鑿廣韻上平聲十九臻𨬖字注錀兔奄錀廣韻上平聲二十交錀字注鐻樂器形似夾鐘削木為之廣韻去聲九御鐻字注鉷弩牙辟致也集韻上平聲一東鉷字注钃𨧦鉏也集韻上平聲五支𨧦錃字注䥗燒鐵久也集韻去聲二十九換䥗字注矟長一丈八尺也大般涅槃經音義勝天王般若經音義大雲經音義增一阿含經音義佛本行經音義廣百論音義輚臥車也音仕板反後漢書班固傳注文選西都賦注引作士眼切廣韻上聲二十六産輚字注引上句亦兵車也又載柩車輚也龍龕手鑑卷一轏臥車也集韻去聲三十諫轏字注輊重轅兩尾初學記卷二十五轔憐軫切文選西京賦注阰山在楚音毗史記叔孫通傳索隱㡮𧰙也玉篇乙部酮馬酪也集韻上平聲一東酮字注古今韻會同醭䤍醬敗壞也醬敗則䤍生也僧祗律音義
